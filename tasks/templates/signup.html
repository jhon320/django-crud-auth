{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <h2 class="fw-bold">Crear cuenta</h2>

                        <p class="text-muted">
                            Regístrate para comenzar a utilizar el sistema.
                        </p>

                    </div>

                    {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                    {% endif %}

                    <form action="{% url 'signup' %}" method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Usuario
                            </label>

                            {{ form.username }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Contraseña
                            </label>

                            {{ form.password1 }}

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirmar contraseña
                            </label>

                            {{ form.password2 }}

                        </div>

                        <div class="d-grid">

                            <button class="btn btn-primary btn-lg rounded-3">

                                Crear cuenta

                            </button>

                        </div>

                    </form>

                    <hr>

                    <div class="text-center">

                        ¿Ya tienes una cuenta?

                        <a href="{% url 'signin' %}">
                            Iniciar sesión
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
